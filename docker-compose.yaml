services:

  # ============================================================
  # LAYANAN 1: MLflow Tracking Server
  # ============================================================
  mlflow-server:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    container_name: mlflow-server
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    ports:
      - "5000:5000"
    volumes:
      - mlflow-db:/mlflow
      - ./mlruns:/mlflow/mlruns
      - ./models:/mlflow/models
    networks:
      - mlops-network
    restart: unless-stopped

  # ============================================================
  # LAYANAN 2: FastAPI Inferensi Model
  # ============================================================
  api-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-service
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow-server:5000
      - MODEL_NAME=AAPL-RF-Production
      - MODEL_ALIAS=production
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./mlflow.db:/app/mlflow.db
    networks:
      - mlops-network
    depends_on:
      - mlflow-server
    restart: unless-stopped

# ============================================================
# NETWORK
# ============================================================
networks:
  mlops-network:
    driver: bridge
    name: mlops-network

# ============================================================
# VOLUMES
# ============================================================
volumes:
  mlflow-db:
    name: mlops-mlflow-db
