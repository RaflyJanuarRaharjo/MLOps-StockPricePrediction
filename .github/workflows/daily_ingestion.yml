name: Daily Data Ingestion - AAPL Stock Price

on:
  schedule:
    - cron: '0 21 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ingest-and-preprocess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install yfinance pandas numpy

      - name: Create Data Folders
        run: |
          mkdir -p data/raw
          mkdir -p data/processed

      - name: Run Data Ingestion
        run: |
          python src/data/ingest_data.py

      - name: Run Preprocessing
        run: |
          python src/data/preprocess.py

      - name: Commit New Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/*.csv data/processed/*.csv 2>/dev/null || true
          git diff --staged --quiet || git commit -m "data: auto-ingest AAPL $(date +'%Y-%m-%d') [skip ci]"
          git push || echo "Nothing to push"
